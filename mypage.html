<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>E-SOUL 마이페이지</title>

<link rel="stylesheet"
href="./css/style.css">

</head>

<body>

<div class="app">

<header>

👤 마이페이지

</header>

<div class="page">

<!-- 프로필 -->

<div class="card profile-card">

<img
id="profileImg"
src="img/happy.png"
class="profile-logo">

<h2 id="userName">

사용자

</h2>

<p id="userEmail">

email@example.com

</p>

</div>

<!-- 포인트 -->

<div class="card">

<h3>

🎁 현재 포인트

</h3>

<h2 id="userPoint">

0P

</h2>

</div>

<!-- 레벨 -->

<div class="card">

<h3>

⭐ 현재 레벨

</h3>

<h2 id="userLevel">

LV1 🥚

</h2>

</div>

<!-- 연속 실천 -->

<div class="card">

<h3>

🔥 연속 실천

</h3>

<h2 id="userStreak">

🔥 1일

</h2>

</div>

<!-- 업적 -->

<div class="card">

<h3>

🏆 업적

</h3>

<ul style="margin-top:10px; line-height:2;">

<li>첫 회원가입</li>

<li>첫 에너지 기록</li>

<li>첫 미션 완료</li>

</ul>

</div>

<!-- 로그아웃 -->

<button onclick="logout()">

로그아웃

</button>

</div>

<nav class="bottom-nav">

<a href="home.html">

🏠<br>
홈

</a>

<a href="record.html">

⚡<br>
기록

</a>

<a href="mission.html">

🎯<br>
미션

</a>

<a href="compare.html">

📊<br>
비교

</a>

<a href="reward.html">

🎁<br>
보상

</a>

<a
href="mypage.html"
class="active">

👤<br>
마이

</a>

</nav>

</div>

<script>

const currentUser =

JSON.parse(
localStorage.getItem(
"currentUser"
)
);

if(!currentUser){

location.href =
"login.html";

}

// 이름

document.getElementById(
"userName"
).innerText =

currentUser.name;

// 이메일

document.getElementById(
"userEmail"
).innerText =

currentUser.email;

// 포인트

document.getElementById(
"userPoint"
).innerText =

currentUser.points + "P";

// 레벨

let level =

"LV1 🥚";

if(currentUser.points >= 100){

level =

"LV2 🌱";

}

if(currentUser.points >= 300){

level =

"LV3 😊";

}

if(currentUser.points >= 600){

level =

"LV4 ⭐";

}

document.getElementById(
"userLevel"
).innerText =
level;

// 연속 실천

document.getElementById(
"userStreak"
).innerText =

"🔥 " +
(currentUser.streak || 1)
+ "일";

// 캐릭터 상태

const profileImg =

document.getElementById(
"profileImg"
);

const energy =

currentUser.energy || 0;

if(energy <= 3){

profileImg.src =
"img/happy.png";

}
else if(energy <= 5){

profileImg.src =
"img/wink.png";

}
else if(energy <= 7){

profileImg.src =
"img/tired.png";

}
else{

profileImg.src =
"img/sad.png";

}

// 로그아웃

function logout(){

localStorage.removeItem(
"currentUser"
);

location.href =
"index.html";

}

</script>

</body>

</html>
