<script>

// 로그인 확인

const currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

if(!currentUser){

    location.href = "login.html";

}

// 미션 데이터 생성

if(!currentUser.missions){

    currentUser.missions = {

        mission1:false,
        mission2:false,
        mission3:false,
        mission4:false,
        mission5:false

    };

}

// 체크박스 배열

const missionIds = [

    "mission1",
    "mission2",
    "mission3",
    "mission4",
    "mission5"

];

// 불러오기

missionIds.forEach(id => {

    const checkbox =
    document.getElementById(id);

    checkbox.checked =
    currentUser.missions[id] || false;

    checkbox.addEventListener(
        "change",
        saveMissions
    );

});

updateUI();


// 저장 함수

function saveMissions(){

    missionIds.forEach(id => {

        currentUser.missions[id] =
        document.getElementById(id).checked;

    });

    let checkedCount = 0;

    missionIds.forEach(id => {

        if(currentUser.missions[id]){

            checkedCount++;

        }

    });

    currentUser.points =
    checkedCount * 20;

    saveUser();

    updateUI();

}


// UI 갱신

function updateUI(){

    let checkedCount = 0;

    missionIds.forEach(id => {

        if(currentUser.missions[id]){

            checkedCount++;

        }

    });

    const point =
    checkedCount * 20;

    document.getElementById(
        "todayPoint"
    ).innerText =
    point + "P";


    let level =
    "LV1 🥚";

    if(point >= 100){

        level =
        "LV2 🌱";

    }

    if(point >= 300){

        level =
        "LV3 😊";

    }

    if(point >= 600){

        level =
        "LV4 ⭐";

    }

    document.getElementById(
        "level"
    ).innerText =
    level;

}


// 사용자 저장

function saveUser(){

    let users =

    JSON.parse(
    localStorage.getItem(
    "users"
    )
    ) || [];


    const index =

    users.findIndex(

    u =>

    u.email ===
    currentUser.email

    );


    if(index !== -1){

        users[index] =
        currentUser;

    }


    localStorage.setItem(

    "users",

    JSON.stringify(users)

    );


    localStorage.setItem(

    "currentUser",

    JSON.stringify(
    currentUser
    )

    );

}

</script>
